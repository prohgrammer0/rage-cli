vaults = []

# Named source profiles. In your own config file, add [projects.<name>] tables
# with a sources array, then run with --project <name> or RAGE_PROJECT=<name>.
projects = {}

[context]
# Claude Projects-like stable project prompt.
# Empty by default. In your own config file, use [[context.sources]] entries
# for exact files, directories, or simple globs; see README.md for examples.
sources = []
extensions = [".md"]
max_tokens = 180000
cache = true

[sessions]
enabled = true
path = "./data/sessions.db"

# Model registry entries may carry a `price` table (USD per million tokens)
# used to show per-response cost in the footer. cache_read/cache_write default
# to the input rate when omitted. Entries without a price show tokens but no
# cost.
#   price = { input = 3.0, output = 15.0, cache_read = 0.3, cache_write = 3.75 }
#
# Prices below are from [models.pricing].source, as of [models.pricing].updated.
# Tiered models (Gemini 3.1 Pro >200K, GPT 5.5 >272K) use the lower tier, which
# holds for the default context.max_tokens of 180000.

# LINE EDITOR: CLOUD
# Fast long-context model for prose-level critique.
[models.line_edit]
provider = "zen"
default = "deepseek-v4-flash"

# DEVELOPMENTAL EDITOR: CLOUD
# Strong long-context model for structural critique.
[models.developmental]
provider = "zen"
default = "deepseek-v4-pro"

# Where the registry prices came from and when they were last verified.
# Logged at session start. Update both fields when refreshing prices.
[models.pricing]
updated = "2026-07-06"
source = "https://opencode.ai/docs/zen/#pricing"

[models.registry.cloud."gemini-3.5-flash"]
roles = ["line_edit", "developmental"]
notes = "Gemini 3.5 Flash. Fast 1M-context option."
price = { input = 1.50, output = 9.00, cache_read = 0.15 }

[models.registry.cloud."gemini-3.1-pro"]
roles = ["line_edit", "developmental"]
notes = "Gemini 3.1 Pro. Strong 1M-context project-level reader."
price = { input = 2.00, output = 12.00, cache_read = 0.20 }

[models.registry.cloud."claude-opus-4-8"]
roles = ["line_edit", "developmental"]
notes = "Claude Opus 4.8. Highest-cost cached 1M-context option for difficult reads."
price = { input = 5.00, output = 25.00, cache_read = 0.50, cache_write = 6.25 }

[models.registry.cloud."claude-sonnet-4-6"]
roles = ["line_edit", "developmental"]
notes = "Claude Sonnet 4.6. Balanced cached 1M-context option."
